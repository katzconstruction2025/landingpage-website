<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Katz Construction Inc.</title>
  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('fonts/Gotham_Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #242f38;
      --text: #ffffff;
      --text-dim: rgba(232, 228, 220, 0.55);
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Gotham', sans-serif;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 150px;
      min-height: 100vh;
      padding: 52px 40px 48px;
      letter-spacing: 0.08em;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* LOGO AREA */
    .logo-area {
      animation: slideDown 1s ease forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      width: 320px;
      height: auto;
      display: block;
    }

    /* CENTER */
    .center {
      text-align: center;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.7s;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .coming-soon {
      font-family: 'Gotham', sans-serif;
      font-weight: 400;
      font-size: clamp(18px, 5vw, 31px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
    }

    /* CONTACT */
    .contact {
      text-align: center;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1s;
      opacity: 0;
    }

    .contact-label {
      font-size: 18px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 40px;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .contact-item {
      font-size: 15px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 400;
      pointer-events: auto;
      cursor: pointer;
    }

    .contact-item:hover {
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <img class="logo-img" src="images/logo.png" alt="Katz Construction Inc." />
  </div>

  <div class="center">
    <h1 class="coming-soon">Coming Soon</h1>
  </div>

  <div class="contact">
    <p class="contact-label">Contact:</p>
    <div class="contact-items">
      <a class="contact-item" href="tel:3107793055">310 779 3055</a>
      <a class="contact-item" href="mailto:office&#64;katzconstruction.com">office&#64;katzconstruction.com</a>
    </div>
  </div>

</body>
</html>
